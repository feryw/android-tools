name: Build Android Tools in Debian Bookworm armhf chroot

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-in-debian-chroot:
    runs-on: ubuntu-22.04-arm64
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Fetch and extract Debian Bookworm armhf rootfs
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq xz-utils

          mkdir -p /opt/chroot
          ROOTFS_PATH=$(curl -s https://images.linuxcontainers.org/meta/1.0/index-system | \
            jq -r '."debian/bookworm/armhf/default".items[0].path')
          curl -L "https://images.linuxcontainers.org${ROOTFS_PATH}" -o /opt/chroot/rootfs.tar.xz

          mkdir -p /opt/chroot/debian-bookworm-armhf
          sudo tar -xJf /opt/chroot/rootfs.tar.xz -C /opt/chroot/debian-bookworm-armhf

      - name: Prepare chroot environment
        run: |
          sudo mkdir -p /opt/chroot/debian-bookworm-armhf/src
          sudo cp -r . /opt/chroot/debian-bookworm-armhf/src
          for dir in proc sys dev dev/pts; do
            sudo mkdir -p /opt/chroot/debian-bookworm-armhf/$dir
            sudo mount --bind /$dir /opt/chroot/debian-bookworm-armhf/$dir
          done

      - name: Build inside chroot
        run: |
          sudo chroot /opt/chroot/debian-bookworm-armhf /bin/bash -c "
            apt update &&
            DEBIAN_FRONTEND=noninteractive apt install -y build-essential pkg-config zlib1g-dev libssl-dev &&
            cd /src &&
            make -f adbd.mk clean all &&
            make -f adb.mk clean all &&
            make -f fastboot.mk clean all &&
            mkdir -p output/bin &&
            cp adbd adb fastboot output/bin/ &&
            tar -czvf android-tools-armhf-\${GITHUB_REF##*/}.tar.gz -C output bin
          "

      - name: Copy artifact from chroot
        run: |
          cp /opt/chroot/debian-bookworm-armhf/src/android-tools-armhf-${GITHUB_REF##*/}.tar.gz .

      - name: Upload release
        uses: ncipollo/release-action@v1
        with:
          artifacts: android-tools-armhf-${{ github.ref_name }}.tar.gz
          body: "✅ Built inside Debian Bookworm armhf chroot (via LinuxContainers.org)\nIncludes: adb, adbd, fastboot"
          tag: ${{ github.ref_name }}
