name: Build Android Tools in Ubntu Jammy armhf chroot

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-in-debian-chroot:
    runs-on: ubuntu-22.04
    name: Build in Ubuntu Jammy armhf chroot
    steps:
      - name: 🧾 Checkout source
        uses: actions/checkout@v3

      - name: 📦 Install QEMU and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support curl xz-utils grep coreutils jq curl xz-utils grep coreutils

      - name: 📦 Fetch rootfs
        run: |
          echo "📡 Fetching rootfs metadata..."
          DOWNLOAD_SERVER="images.linuxcontainers.org"
          ROOTFS_URL="https://$DOWNLOAD_SERVER//images/ubuntu/jammy/armhf/default/20250715_08:28//rootfs.tar.xz"
          echo "✅ Resolved rootfs URL: $ROOTFS_URL"

          mkdir -p /opt/chroot
          curl -L -o /opt/chroot/rootfs.tar.xz "$ROOTFS_URL"

          echo "📂 Extracting rootfs..."
          mkdir -p /opt/chroot/ubuntu-jammy-armhf
          sudo tar -xf /opt/chroot/rootfs.tar.xz -C /opt/chroot/ubuntu-jammy-armhf
          rm /opt/chroot/rootfs.tar.xz

      - name: 🛠️ Prepare chroot environment
        run: |
          echo "📁 Copying source into chroot..."
          sudo mkdir -p /opt/chroot/ubuntu-jammy-armhf/src
          sudo cp -r . /opt/chroot/ubuntu-jammy-armhf/src

          echo "🔗 Mounting system directories..."
          for dir in proc sys dev dev/pts; do
            sudo mkdir -p /opt/chroot/ubuntu-jammy-armhf/$dir
            sudo mount --bind /$dir /opt/chroot/ubuntu-jammy-armhf/$dir
          done

          echo "📦 Copying qemu-arm-static into chroot..."
          sudo cp /usr/bin/qemu-arm-static /opt/chroot/ubuntu-jammy-armhf/usr/bin/
          sudo ls -al /opt/chroot/ubuntu-jammy-armhf/etc
          sudo cat /opt/chroot/ubuntu-jammy-armhf/etc/resolv.conf
          #sudo mkdir -p /opt/chroot/ubuntu-jammy-armhf/etc
          #sudo touch /opt/chroot/ubuntu-jammy-armhf/etc/resolv.conf
          echo "nameserver 1.1.1.1" | sudo tee -a /opt/chroot/ubuntu-jammy-armhf/etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee -a /opt/chroot/ubuntu-jammy-armhf/etc/resolv.conf

      - name: 🧪 Build inside chroot
        run: |
          echo "🚀 Entering chroot and building..."
          sudo chroot /opt/chroot/ubuntu-jammy-armhf /bin/bash -c "
            apt update &&
            DEBIAN_FRONTEND=noninteractive apt install -y build-essential pkg-config zlib1g-dev libssl-dev &&
            cd /src &&
            make -f adbd.mk clean all &&
            make -f adb.mk clean all &&
            make -f fastboot.mk clean all &&
            mkdir -p output/bin &&
            cp adbd adb fastboot output/bin/ &&
            tar -czvf android-tools-armhf-full-\${GITHUB_REF##*/}.tar.gz -C /src .
          "

      - name: 📤 Copy full source tree archive from chroot
        run: |
          cp /opt/chroot/ubuntu-jammy-armhf/src/android-tools-armhf-full-${GITHUB_REF##*/}.tar.gz .

      - name: 🚀 Upload release
        uses: ncipollo/release-action@v1
        with:
          artifacts: android-tools-armhf-full-${{ github.ref_name }}.tar.gz
          body: "✅ Full source + binaries built inside Debian Bookworm armhf chroot\nIncludes: adb, adbd, fastboot, Makefiles, and all sources"
          tag: ${{ github.ref_name }}
