name: Build Android Tools in Alpine armhf

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-in-container:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Install Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io

      - name: Build in Alpine armhf container
        run: |
          docker run --rm -v $PWD:/src -w /src \
            linuxcontainers/alpine/3.22/armhf/default \
            sh -c "
              apk update &&
              apk add build-base musl-dev zlib-dev openssl-dev pkgconfig &&
              make -f adbd.mk clean all &&
              make -f adb.mk clean all &&
              make -f fastboot.mk clean all &&
              mkdir -p output/bin &&
              cp adbd adb fastboot output/bin/ &&
              tar -czvf android-tools-armhf-${GITHUB_REF##*/}.tar.gz -C output bin
            "

      - name: Upload release
        uses: ncipollo/release-action@v1
        with:
          artifacts: android-tools-armhf-${{ github.ref_name }}.tar.gz
          body: "✅ Built inside Alpine 3.22 armhf container\nIncludes: adb, adbd, fastboot"
          tag: ${{ github.ref_name }}
