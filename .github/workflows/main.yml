name: Build Android Tools

on:
  push:
    tags:
      - 'v*'

jobs:
  build-armhf:
    runs-on: ubuntu-22.04-arm
    name: Build android-tool
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config zlib1g-dev libssl-dev

      - name: Build adbd
        run: |
          make -f adbd.mk clean all
          mkdir -p output/bin
          cp adbd output/bin/

      - name: Build adb
        run: |
          make -f adb.mk clean all
          cp adb output/bin/

      - name: Build fastboot
        run: |
          make -f fastboot.mk clean all
          cp fastboot output/bin/

      - name: Package binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p output/release
          tar -czvf output/release/android-tools-armhf-${VERSION}.tar.gz -C output bin

      - name: Upload release
        uses: ncipollo/release-action@v1
        with:
          body: "✅ Android tools compiled for ARMv7 (armhf)\nIncludes: adb, adbd, fastboot"
          tag: ${{ github.ref_name }}
