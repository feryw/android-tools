name: Build Android Tools in Debian Bookworm armhf chroot

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-in-debian-chroot:
    runs-on: ubuntu-22.04
    name: Build in Debian Bookworm armhf chroot
    steps:
      - name: 🧾 Checkout source
        uses: actions/checkout@v3

      - name: 📦 Install tools and fetch rootfs
        run: |
          sudo apt-get update
          sudo apt-get install -y curl xz-utils grep coreutils

          echo "📡 Fetching rootfs metadata..."
          DOWNLOAD_SERVER="images.linuxcontainers.org"
          DOWNLOAD_INDEX_PATH="/meta/1.0/index-system"
          DISTRO_ARCH="armhf"
          DOWNLOAD_DISTRO="debian;bookworm;${DISTRO_ARCH};default"

          ROOTFS_URL="https://$DOWNLOAD_SERVER$(curl -fsSL https://$DOWNLOAD_SERVER$DOWNLOAD_INDEX_PATH | \
            grep \"$DOWNLOAD_DISTRO\" | cut -f6 -d';')rootfs.tar.xz"

          echo "✅ Resolved rootfs URL: $ROOTFS_URL"

          mkdir -p /opt/chroot
          curl -L -o /opt/chroot/rootfs.tar.xz "$ROOTFS_URL"

          echo "📂 Extracting rootfs..."
          mkdir -p /opt/chroot/debian-bookworm-armhf
          sudo tar -xf /opt/chroot/rootfs.tar.xz -C /opt/chroot/debian-bookworm-armhf
          rm /opt/chroot/rootfs.tar.xz

      - name: 🛠️ Prepare chroot environment
        run: |
          echo "📁 Copying source into chroot..."
          sudo mkdir -p /opt/chroot/debian-bookworm-armhf/src
          sudo cp -r . /opt/chroot/debian-bookworm-armhf/src

          echo "🔗 Mounting system directories..."
          for dir in proc sys dev dev/pts; do
            sudo mkdir -p /opt/chroot/debian-bookworm-armhf/$dir
            sudo mount --bind /$dir /opt/chroot/debian-bookworm-armhf/$dir
          done

      - name: 🧪 Build inside chroot
        run: |
          echo "🚀 Entering chroot and building..."
          sudo chroot /opt/chroot/debian-bookworm-armhf /bin/bash -c "
            apt update &&
            DEBIAN_FRONTEND=noninteractive apt install -y build-essential pkg-config zlib1g-dev libssl-dev &&
            cd /src &&
            make -f adbd.mk clean all &&
            make -f adb.mk clean all &&
            make -f fastboot.mk clean all &&
            mkdir -p output/bin &&
            cp adbd adb fastboot output/bin/ &&
            tar -czvf android-tools-armhf-full-\${GITHUB_REF##*/}.tar.gz -C /src .
          "

      - name: 📤 Copy full source tree archive from chroot
        run: |
          cp /opt/chroot/debian-bookworm-armhf/src/android-tools-armhf-full-${GITHUB_REF##*/}.tar.gz .

      - name: 🚀 Upload release
        uses: ncipollo/release-action@v1
        with:
          artifacts: android-tools-armhf-full-${{ github.ref_name }}.tar.gz
          body: "✅ Full source + binaries built inside Debian Bookworm armhf chroot\nIncludes: adb, adbd, fastboot, Makefiles, and all sources"
          tag: ${{ github.ref_name }}
